<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApesTogether Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
<script>window.PropTypes = window.PropTypes || propTypes;</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0a0a0f;--bg-card:#12121a;--bg-elevated:#181822;--bg-hover:#1e1e2e;
  --border:#1e1e2e;--border-light:#2a2a3a;
  --text-primary:#f0f0f5;--text-secondary:#8888a0;--text-muted:#55556a;
  --accent:#2dd4a8;--accent-dim:#1a8a6e;--accent-glow:rgba(45,212,168,0.15);
  --red:#ef4444;--red-dim:#7f1d1d;--yellow:#f59e0b;--yellow-dim:#78350f;
  --green:#22c55e;--blue:#3b82f6;
}
html,body,#root{height:100%;font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text-primary);overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
input,select,textarea,button{font-family:inherit}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script>window.__ADMIN_KEY__ = "{{ admin_api_key }}";</script>
{% raw %}<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area, CartesianGrid } = Recharts;

// ─── Config ──────────────────────────────────────────────────────────────────
const API_BASE = '/api/mobile';

// ─── API Helper (session-cookie auth) ────────────────────────────────────────
// NOTE: Server already verified Google OAuth + TOTP before serving this file.
// No client-side auth check needed — just provide the api() helper.
function useApi() {
  const api = useCallback(async (endpoint, opts = {}) => {
    const headers = { 'Content-Type': 'application/json' };
    if (window.__ADMIN_KEY__) headers['X-Admin-Key'] = window.__ADMIN_KEY__;
    if (opts.otp) headers['X-Admin-OTP'] = opts.otp;
    const url = `${API_BASE}${endpoint}`;
    const res = await fetch(url, {
      method: opts.method || 'GET',
      headers,
      credentials: 'include', // send session cookie
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    const data = await res.json();
    if (res.status === 403) throw new Error('AUTH_FAILED');
    if (res.status === 401) throw new Error('2FA_REQUIRED');
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }, []);

  return { api };
}

// ─── Icons (inline SVGs) ────────────────────────────────────────────────────
const Icons = {
  command: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>,
  bot: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>,
  dollar: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  users: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  mail: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
  activity: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  logout: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  refresh: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
  alert: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  check: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  plus: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  search: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  arrowUp: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>,
  arrowDown: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>,
  gift: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>,
  trash: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  play: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  pause: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
};

// ─── Shared Components ──────────────────────────────────────────────────────
const Card = ({ children, className = '', style = {} }) => (
  <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 12, padding: 20, ...style }} className={className}>{children}</div>
);

const MetricCard = ({ label, value, sub, color, icon }) => (
  <Card style={{ minWidth: 160, flex: 1 }}>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
      <div>
        <div style={{ fontSize: 12, color: 'var(--text-secondary)', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 8 }}>{label}</div>
        <div style={{ fontSize: 28, fontWeight: 700, color: color || 'var(--text-primary)', lineHeight: 1 }}>{value}</div>
        {sub && <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 6 }}>{sub}</div>}
      </div>
      {icon && <div style={{ color: color || 'var(--accent)', opacity: 0.6 }}>{icon}</div>}
    </div>
  </Card>
);

const Badge = ({ text, color = 'var(--accent)' }) => (
  <span style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600, background: color + '22', color, border: `1px solid ${color}44` }}>{text}</span>
);

const Btn = ({ children, onClick, variant = 'primary', small, disabled, style = {} }) => {
  const base = { border: 'none', borderRadius: 8, cursor: disabled ? 'not-allowed' : 'pointer', fontWeight: 600, fontSize: small ? 12 : 14, padding: small ? '5px 12px' : '10px 20px', transition: 'all .2s', display: 'inline-flex', alignItems: 'center', gap: 6, opacity: disabled ? 0.5 : 1 };
  const variants = {
    primary: { background: 'var(--accent)', color: '#000' },
    secondary: { background: 'var(--bg-elevated)', color: 'var(--text-primary)', border: '1px solid var(--border-light)' },
    danger: { background: 'var(--red-dim)', color: 'var(--red)' },
    ghost: { background: 'transparent', color: 'var(--text-secondary)' },
  };
  return <button style={{ ...base, ...variants[variant], ...style }} onClick={onClick} disabled={disabled}>{children}</button>;
};

const Spinner = () => <div style={{ width: 20, height: 20, border: '2px solid var(--border-light)', borderTop: '2px solid var(--accent)', borderRadius: '50%', animation: 'spin .6s linear infinite' }}><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>;

const Modal = ({ open, onClose, title, children }) => {
  if (!open) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,.7)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
      <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-light)', borderRadius: 16, padding: 28, minWidth: 400, maxWidth: 520, maxHeight: '80vh', overflow: 'auto' }} onClick={e => e.stopPropagation()} className="fade-in">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h3 style={{ fontSize: 18, fontWeight: 600 }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: 20 }}>&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
};

const Input = ({ label, ...props }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: 'block', fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>{label}</label>}
    <input style={{ width: '100%', padding: '10px 14px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 14, outline: 'none' }} {...props} />
  </div>
);

const Select = ({ label, options, ...props }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: 'block', fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>{label}</label>}
    <select style={{ width: '100%', padding: '10px 14px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 14, outline: 'none' }} {...props}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Table = ({ columns, data, onRowClick }) => (
  <div style={{ overflowX: 'auto' }}>
    <table style={{ width: '100%', borderCollapse: 'collapse' }}>
      <thead>
        <tr>{columns.map(c => <th key={c.key} style={{ textAlign: 'left', padding: '10px 12px', fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '.5px', borderBottom: '1px solid var(--border)' }}>{c.label}</th>)}</tr>
      </thead>
      <tbody>
        {data.map((row, i) => (
          <tr key={i} style={{ cursor: onRowClick ? 'pointer' : 'default', transition: 'background .15s' }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-hover)'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            onClick={() => onRowClick && onRowClick(row)}>
            {columns.map(c => <td key={c.key} style={{ padding: '10px 12px', fontSize: 13, borderBottom: '1px solid var(--border)', color: 'var(--text-primary)' }}>{c.render ? c.render(row[c.key], row) : row[c.key]}</td>)}
          </tr>
        ))}
        {data.length === 0 && <tr><td colSpan={columns.length} style={{ padding: 30, textAlign: 'center', color: 'var(--text-muted)' }}>No data</td></tr>}
      </tbody>
    </table>
  </div>
);

const AlertBanner = ({ alerts }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
    {alerts.map((a, i) => {
      const colors = { error: 'var(--red)', warning: 'var(--yellow)', ok: 'var(--green)' };
      const bgs = { error: 'var(--red-dim)', warning: 'var(--yellow-dim)', ok: 'rgba(34,197,94,.1)' };
      return (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 8, background: bgs[a.level], border: `1px solid ${colors[a.level]}33` }}>
          <span style={{ color: colors[a.level] }}>{a.level === 'ok' ? Icons.check : Icons.alert}</span>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: colors[a.level] }}>{a.title}</div>
            {a.detail && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{a.detail}</div>}
          </div>
        </div>
      );
    })}
  </div>
);

const chartTooltipStyle = { contentStyle: { background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, fontSize: 12, color: 'var(--text-primary)' }, cursor: { fill: 'rgba(45,212,168,.08)' } };

// ─── Auth Screen (Google OAuth) ─────────────────────────────────────────────
const AuthScreen = () => {
  return (
    <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-base)' }}>
      <div className="fade-in" style={{ width: 400, padding: 40, background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 20 }}>
        <div style={{ textAlign: 'center', marginBottom: 32 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
            <div style={{ width: 40, height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <img src="/static/img/logo.png" alt="ApesTogether" width="40" height="40" style={{ objectFit: 'contain' }} />
            </div>
            <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.5px' }}>ApesTogether</span>
          </div>
          <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>Admin Command Center</div>
        </div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)', textAlign: 'center', marginBottom: 24, lineHeight: 1.6 }}>
          Sign in with your Google admin account to access the dashboard. Destructive actions require Google Authenticator 2FA.
        </p>
        <a href="/login/google" style={{ textDecoration: 'none', display: 'block' }}>
          <button style={{
            width: '100%', padding: '12px 20px', borderRadius: 10, border: '1px solid var(--border-light)',
            background: 'var(--bg-elevated)', color: 'var(--text-primary)', fontSize: 15, fontWeight: 600,
            cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12,
            transition: 'all .2s',
          }}
          onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-hover)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg-elevated)'; e.currentTarget.style.borderColor = 'var(--border-light)'; }}>
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign in with Google
          </button>
        </a>
        <div style={{ textAlign: 'center', marginTop: 20, fontSize: 11, color: 'var(--text-muted)' }}>
          Secured with Google OAuth + TOTP 2FA
        </div>
      </div>
    </div>
  );
};

// ─── Loading Screen ─────────────────────────────────────────────────────────
const LoadingScreen = () => (
  <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-base)' }}>
    <div style={{ textAlign: 'center' }}>
      <Spinner />
      <div style={{ marginTop: 16, fontSize: 13, color: 'var(--text-muted)' }}>Checking authentication...</div>
    </div>
  </div>
);

// ─── OTP Modal ──────────────────────────────────────────────────────────────
const OtpModal = ({ open, onClose, onConfirm, title }) => {
  const [otp, setOtp] = useState('');
  return (
    <Modal open={open} onClose={onClose} title={title || '2FA Verification'}>
      <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16 }}>Enter the 6-digit code from your authenticator app.</p>
      <Input label="TOTP Code" value={otp} onChange={e => setOtp(e.target.value.replace(/\D/g,'').slice(0,6))} placeholder="000000" autoFocus />
      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={() => { onConfirm(otp); setOtp(''); }} disabled={otp.length !== 6}>Confirm</Btn>
      </div>
    </Modal>
  );
};

// ─── Page: Command Center ───────────────────────────────────────────────────
const CommandCenter = ({ api }) => {
  const [dashboard, setDashboard] = useState(null);
  const [alerts, setAlerts] = useState(null);
  const [feed, setFeed] = useState(null);
  const [revenue, setRevenue] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [d, a, f, r] = await Promise.all([
        api('/admin/bot/dashboard'),
        api('/admin/bot/alert-summary'),
        api('/admin/bot/activity-feed?limit=20'),
        api('/admin/bot/revenue-summary'),
      ]);
      setDashboard(d); setAlerts(a); setFeed(f); setRevenue(r);
    } catch (e) { console.error(e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { load(); }, [load]);

  if (loading) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '60vh' }}><Spinner /></div>;

  const d = dashboard || {};
  const r = revenue || {};

  // Build chart data from industry breakdown
  const industryData = Object.entries(d.industry_breakdown || {}).map(([name, value]) => ({ name, value }));
  const COLORS = ['#2dd4a8', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* Metrics Row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: 14 }}>
        <MetricCard label="Total Users" value={d.total_users || 0} sub={`${d.human_users || 0} human / ${d.bot_users || 0} bots`} color="var(--accent)" icon={Icons.users} />
        <MetricCard label="Active Bots" value={d.active_bots || 0} sub={`${d.inactive_bots || 0} inactive`} color="var(--blue)" icon={Icons.bot} />
        <MetricCard label="Subscriptions" value={d.total_subscriptions || 0} sub={`${d.real_subscriptions || 0} real / ${d.gifted_subscriptions || 0} gifted`} color="var(--green)" icon={Icons.gift} />
        <MetricCard label="MRR" value={`$${(r.mrr || 0).toFixed(2)}`} sub={`Platform: $${(r.platform_revenue || 0).toFixed(2)}`} color="var(--accent)" icon={Icons.dollar} />
        <MetricCard label="Payout Obligation" value={`$${(r.total_payout_obligation || 0).toFixed(2)}`} sub={`Gifted: $${(r.company_obligation || 0).toFixed(2)}`} color="var(--yellow)" icon={Icons.dollar} />

// ─── Page: Bot Management ───────────────────────────────────────────────────
const STRATEGIES = [
  { value: '', label: 'Random (diverse)' },
  { value: 'momentum', label: 'Momentum' }, { value: 'value', label: 'Value' },
  { value: 'news_reactor', label: 'News Reactor' }, { value: 'swing', label: 'Swing' },
  { value: 'earnings', label: 'Earnings' }, { value: 'sector_rotation', label: 'Sector Rotation' },
  { value: 'insider_follower', label: 'Insider Follower' }, { value: 'dividend_growth', label: 'Dividend Growth' },
  { value: 'social_momentum', label: 'Social Momentum' }, { value: 'balanced', label: 'Balanced' },
];
const INDUSTRIES = [
  { value: '', label: 'Random (diverse)' },
  { value: 'Technology', label: 'Technology' }, { value: 'Healthcare', label: 'Healthcare' },
  { value: 'Energy', label: 'Energy' }, { value: 'Finance', label: 'Finance' },
  { value: 'Consumer', label: 'Consumer' }, { value: 'Industrial', label: 'Industrial' },
  { value: 'Real Estate', label: 'Real Estate' }, { value: 'ETF', label: 'ETF' },
  { value: 'General', label: 'General' },
];

const BotManagement = ({ api }) => {
  const [bots, setBots] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [showOtp, setShowOtp] = useState(null);
  const [batchForm, setBatchForm] = useState({ count: 3, strategy: '', industry: '' });
  const [batchResult, setBatchResult] = useState(null);
  const [batchLoading, setBatchLoading] = useState(false);

  // Auto-creation state — always show card with defaults
  const [autoSettings, setAutoSettings] = useState({ enabled: false, daily_count: 2, strategy: null, industry: null, last_run: null, last_created: 0 });
  const [autoSaving, setAutoSaving] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [botData, settings] = await Promise.all([
        api('/admin/bot/list-users?role=agent'),
        api('/admin/bot/auto-create-settings').catch(() => ({})),
      ]);
      setBots(botData.users || []);
      if (settings && settings.success !== undefined) setAutoSettings(prev => ({ ...prev, ...settings }));
    } catch (e) { console.error(e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { load(); }, [load]);

  const handleBatchCreate = async () => {
    setBatchLoading(true);
    setBatchResult(null);
    try {
      const body = { count: batchForm.count };
      if (batchForm.strategy) body.strategy = batchForm.strategy;
      if (batchForm.industry) body.industry = batchForm.industry;
      const res = await api('/admin/bot/batch-seed', { method: 'POST', body });
      setBatchResult(res);
      load();
    } catch (e) { setBatchResult({ error: e.message }); }
    setBatchLoading(false);
  };

  const handleOtpAction = async (otp) => {
    if (!showOtp) return;
    try {
      const { action, userId } = showOtp;
      if (action === 'deactivate') {
        await api('/admin/bot/deactivate', { method: 'POST', body: { user_id: userId }, otp });
      } else if (action === 'reactivate') {
        await api('/admin/bot/reactivate', { method: 'POST', body: { user_id: userId }, otp });
      }
      setShowOtp(null);
      load();
    } catch (e) { alert('Action failed: ' + e.message); }
  };

  const saveAutoSettings = async (patch) => {
    setAutoSaving(true);
    try {
      const res = await api('/admin/bot/auto-create-settings', { method: 'POST', body: patch });
      setAutoSettings(res);
    } catch (e) { alert('Save failed: ' + e.message); }
    setAutoSaving(false);
  };

  const cols = [
    { key: 'username', label: 'Username' },
    { key: 'strategy', label: 'Strategy', render: (v) => <Badge text={v || '—'} color="var(--accent-dim)" /> },
    { key: 'industry', label: 'Industry', render: (v) => <Badge text={v || 'General'} color="var(--blue)" /> },
    { key: 'stock_count', label: 'Stocks' },
    { key: 'subscriber_count', label: 'Subs' },
    { key: 'bot_active', label: 'Status', render: (v) => v !== false ? <Badge text="Active" color="var(--green)" /> : <Badge text="Inactive" color="var(--red)" /> },
    { key: 'id', label: 'Actions', render: (id, row) => (
      <div style={{ display: 'flex', gap: 6 }}>
        {row.bot_active !== false
          ? <Btn small variant="danger" onClick={(e) => { e.stopPropagation(); setShowOtp({ action: 'deactivate', userId: id }); }}>{Icons.pause} Kill</Btn>
          : <Btn small variant="secondary" onClick={(e) => { e.stopPropagation(); setShowOtp({ action: 'reactivate', userId: id }); }}>{Icons.play} Revive</Btn>
        }
      </div>
    )},
  ];

  const botData = bots.map(b => ({
    ...b,
    industry: b.extra_data?.industry || b.industry || 'General',
    strategy: b.extra_data?.trading_style || '—',
    stock_count: b.stock_count || 0,
    subscriber_count: b.subscriber_count || 0,
    bot_active: b.bot_active !== false,
  }));

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700 }}>Bot Fleet</h2>
          <p style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{bots.length} total bots &middot; {botData.filter(b => b.bot_active).length} active</p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <Btn variant="secondary" small onClick={load}>{Icons.refresh}</Btn>
          <Btn onClick={() => setShowCreate(true)}>{Icons.plus} Batch Create</Btn>
        </div>
      </div>

      {/* Auto-Creation Settings Card */}
      <Card>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Daily Auto-Creation</div>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>
              Automatically create bots each day via cron
              {autoSettings.last_run && <span> &middot; Last run: {new Date(autoSettings.last_run).toLocaleDateString()}</span>}
              {autoSettings.last_created > 0 && <span> ({autoSettings.last_created} created)</span>}
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            {autoSaving && <Spinner />}
            <button
              onClick={() => saveAutoSettings({ enabled: !autoSettings.enabled })}
              style={{
                width: 48, height: 26, borderRadius: 13, border: 'none', cursor: 'pointer',
                background: autoSettings.enabled ? 'var(--accent)' : 'var(--border-light)',
                position: 'relative', transition: 'background .2s',
              }}>
              <div style={{
                width: 20, height: 20, borderRadius: '50%', background: '#fff',
                position: 'absolute', top: 3,
                left: autoSettings.enabled ? 25 : 3,
                transition: 'left .2s', boxShadow: '0 1px 3px rgba(0,0,0,.3)',
              }} />
            </button>
          </div>
        </div>
        {autoSettings.enabled && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
            <div>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>Bots Per Day</label>
              <select value={autoSettings.daily_count || 2} onChange={e => saveAutoSettings({ daily_count: parseInt(e.target.value) })}
                style={{ width: '100%', padding: '8px 10px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 13 }}>
                {[1,2,3,5,10,15,20,25,30,50,75,100].map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>Strategy</label>
              <select value={autoSettings.strategy || ''} onChange={e => saveAutoSettings({ strategy: e.target.value || 'random' })}
                style={{ width: '100%', padding: '8px 10px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 13 }}>
                {STRATEGIES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>Industry</label>
              <select value={autoSettings.industry || ''} onChange={e => saveAutoSettings({ industry: e.target.value || 'random' })}
                style={{ width: '100%', padding: '8px 10px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 13 }}>
                {INDUSTRIES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
              </select>
            </div>
          </div>
        )}
      </Card>

      <Card style={{ padding: 0 }}>
        {loading ? <div style={{ padding: 40, textAlign: 'center' }}><Spinner /></div> : <Table columns={cols} data={botData} />}
      </Card>

      {/* Batch Create Modal */}
      <Modal open={showCreate} onClose={() => { setShowCreate(false); setBatchResult(null); }} title="Batch Create Bots">
        <div style={{ display: 'grid', gridTemplateColumns: '80px 1fr', gap: 12, marginBottom: 14 }}>
          <div>
            <label style={{ display: 'block', fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>Count</label>
            <input type="number" min="1" max="100" value={batchForm.count}
              onChange={e => setBatchForm(p => ({ ...p, count: Math.max(1, Math.min(100, parseInt(e.target.value) || 1)) }))}
              style={{ width: '100%', padding: '10px 14px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 14, outline: 'none' }} />
          </div>
          <Select label="Strategy" value={batchForm.strategy} onChange={e => setBatchForm(p => ({ ...p, strategy: e.target.value }))} options={STRATEGIES} />
        </div>
        <Select label="Industry" value={batchForm.industry} onChange={e => setBatchForm(p => ({ ...p, industry: e.target.value }))} options={INDUSTRIES} />

        <div style={{ fontSize: 12, color: 'var(--text-muted)', margin: '10px 0', padding: '10px 14px', background: 'var(--bg-elevated)', borderRadius: 8, lineHeight: 1.6 }}>
          Each bot gets a unique persona, Dirichlet-sampled strategy weights, initial portfolio (4-10 stocks with real-ish prices), and gifted subscribers.
        </div>

        {batchResult && (
          <div style={{ margin: '10px 0', padding: '12px 14px', borderRadius: 8, background: batchResult.error ? 'var(--red-dim)' : 'rgba(45,212,168,0.1)', border: `1px solid ${batchResult.error ? 'var(--red)' : 'var(--accent)'}` }}>
            {batchResult.error ? (
              <div style={{ color: 'var(--red)', fontSize: 13 }}>Error: {batchResult.error}</div>
            ) : (
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--accent)', marginBottom: 6 }}>Created {batchResult.created}/{batchResult.requested} bots</div>
                {(batchResult.bots || []).map((b, i) => (
                  <div key={i} style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                    {b.username} &middot; {b.strategy} &middot; {b.industry} &middot; {b.stocks_seeded} stocks &middot; {b.subscribers_gifted} subs
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 16 }}>
          <Btn variant="secondary" onClick={() => { setShowCreate(false); setBatchResult(null); }}>Close</Btn>
          <Btn onClick={handleBatchCreate} disabled={batchLoading}>
            {batchLoading ? <><Spinner /> Creating...</> : <>{Icons.plus} Create {batchForm.count} Bot{batchForm.count > 1 ? 's' : ''}</>}
          </Btn>
        </div>
      </Modal>

      <OtpModal open={!!showOtp} onClose={() => setShowOtp(null)} onConfirm={handleOtpAction} title={showOtp ? `Confirm ${showOtp.action}` : ''} />
    </div>
  );
};

// ─── Page: Revenue ──────────────────────────────────────────────────────────
const RevenuePage = ({ api }) => {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [giftModal, setGiftModal] = useState(null); // { userId, username }
  const [giftCount, setGiftCount] = useState(1);
  const [showOtp, setShowOtp] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try { setData(await api('/admin/bot/revenue-summary')); } catch (e) { console.error(e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { load(); }, [load]);

  const handleGift = (otp) => {
    if (!giftModal) return;
    api('/admin/bot/gift-subscribers', { method: 'POST', body: { user_id: giftModal.userId, count: giftCount }, otp })
      .then(() => { setShowOtp(null); setGiftModal(null); setGiftCount(1); load(); })
      .catch(e => alert('Gift failed: ' + e.message));
  };

  if (loading) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '60vh' }}><Spinner /></div>;
  const r = data || {};

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <h2 style={{ fontSize: 20, fontWeight: 700 }}>Revenue & Payouts</h2>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: 14 }}>
        <MetricCard label="MRR" value={`$${(r.mrr || 0).toFixed(2)}`} sub={`${r.real_subscriptions || 0} real subs × $9`} color="var(--accent)" />
        <MetricCard label="Store Fees" value={`$${(r.store_fees || 0).toFixed(2)}`} sub="Apple/Google 15%" color="var(--text-muted)" />
        <MetricCard label="Platform Revenue" value={`$${(r.platform_revenue || 0).toFixed(2)}`} sub="15% of post-store" color="var(--accent)" />
        <MetricCard label="Influencer Payouts" value={`$${(r.total_payout_obligation || 0).toFixed(2)}`} sub={`Real: $${(r.influencer_payouts_real || 0).toFixed(2)} | Gift: $${(r.influencer_payouts_gifted || 0).toFixed(2)}`} color="var(--yellow)" />
        <MetricCard label="Company Obligation" value={`$${(r.company_obligation || 0).toFixed(2)}`} sub={`${r.gifted_subscriptions || 0} gifted subs`} color="var(--red)" />
      </div>

      <Card style={{ padding: 0 }}>
        <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontWeight: 600, fontSize: 14 }}>Influencer Payouts</span>
          <Btn variant="secondary" small onClick={load}>{Icons.refresh}</Btn>
        </div>
        <Table columns={[
          { key: 'username', label: 'Username' },
          { key: 'real_subs', label: 'Real Subs' },
          { key: 'gifted_subs', label: 'Gifted', render: v => v > 0 ? <Badge text={v} color="var(--yellow)" /> : '0' },
          { key: 'total_subs', label: 'Total' },
          { key: 'total_payout', label: 'Monthly Payout', render: v => <span style={{ color: 'var(--accent)', fontWeight: 600 }}>${v.toFixed(2)}</span> },
          { key: 'user_id', label: 'Actions', render: (id, row) => (
            <Btn small variant="secondary" onClick={(e) => { e.stopPropagation(); setGiftModal({ userId: id, username: row.username }); }}>{Icons.gift} Gift</Btn>
          )},
        ]} data={r.influencers || []} />
      </Card>

      {/* Gift Modal */}
      <Modal open={!!giftModal} onClose={() => setGiftModal(null)} title={`Gift subscribers to ${giftModal?.username || ''}`}>
        <Input label="Number of subscribers to gift" type="number" min="1" value={giftCount} onChange={e => setGiftCount(parseInt(e.target.value) || 1)} />
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>Company will owe ${(giftCount * (r.per_sub?.influencer_pay || 6.50)).toFixed(2)}/mo to this influencer.</p>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
          <Btn variant="secondary" onClick={() => setGiftModal(null)}>Cancel</Btn>
          <Btn onClick={() => setShowOtp({ action: 'gift' })}>Gift (requires 2FA)</Btn>
        </div>
      </Modal>

      <OtpModal open={!!showOtp} onClose={() => setShowOtp(null)} onConfirm={handleGift} title="Confirm Gift Subscribers" />
    </div>
  );
};

// ─── Page: Users ────────────────────────────────────────────────────────────
const UsersPage = ({ api }) => {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [searchTerm, setSearchTerm] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const data = await api('/admin/bot/list-users');
      setUsers(data.users || []);
    } catch (e) { console.error(e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { load(); }, [load]);

  const filtered = useMemo(() => {
    if (!searchTerm) return users;
    const s = searchTerm.toLowerCase();
    return users.filter(u => u.username?.toLowerCase().includes(s) || u.email?.toLowerCase().includes(s) || String(u.id).includes(s));
  }, [users, searchTerm]);

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <h2 style={{ fontSize: 20, fontWeight: 700 }}>User Management</h2>
        <div style={{ position: 'relative', width: 260 }}>
          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)' }}>{Icons.search}</span>
          <input style={{ width: '100%', padding: '8px 12px 8px 34px', background: 'var(--bg-elevated)', border: '1px solid var(--border-light)', borderRadius: 8, color: 'var(--text-primary)', fontSize: 13, outline: 'none' }}
            placeholder="Search users..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
        </div>
      </div>
      <Card style={{ padding: 0 }}>
        {loading ? <div style={{ padding: 40, textAlign: 'center' }}><Spinner /></div> : (
          <Table columns={[
            { key: 'id', label: 'ID' },
            { key: 'username', label: 'Username' },
            { key: 'email', label: 'Email', render: v => <span style={{ color: 'var(--text-secondary)' }}>{v}</span> },
            { key: 'role', label: 'Role', render: v => <Badge text={v || 'user'} color={v === 'agent' ? 'var(--blue)' : v === 'admin' ? 'var(--red)' : 'var(--accent)'} /> },
            { key: 'stock_count', label: 'Stocks' },
            { key: 'subscriber_count', label: 'Subs' },
          ]} data={filtered} />
        )}
      </Card>
    </div>
  );
};

// ─── Page: Email Trade Monitor ──────────────────────────────────────────────
const EmailMonitor = ({ api }) => {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showOtp, setShowOtp] = useState(null);
  const [assignData, setAssignData] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const data = await api('/admin/bot/pending-trades');
      setPending(data.pending_trades || []);
    } catch (e) { console.error(e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { load(); }, [load]);

  const handleProcess = async () => {
    try { await api('/admin/bot/process-pending-trades', { method: 'POST' }); load(); } catch (e) { alert(e.message); }
  };

  const handleAssign = (otp) => {
    if (!assignData) return;
    api('/admin/bot/assign-pending-trades', { method: 'POST', body: { trade_ids: [assignData.id], bot_id: assignData.botId }, otp })
      .then(() => { setShowOtp(null); setAssignData(null); load(); })
      .catch(e => alert('Assign failed: ' + e.message));
  };

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700 }}>Email Trade Pipeline</h2>
          <p style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{pending.length} pending trade(s)</p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <Btn variant="secondary" small onClick={load}>{Icons.refresh}</Btn>
          <Btn small onClick={handleProcess}>{Icons.play} Reprocess</Btn>
        </div>
      </div>
      <Card style={{ padding: 0 }}>
        {loading ? <div style={{ padding: 40, textAlign: 'center' }}><Spinner /></div> : (
          <Table columns={[
            { key: 'id', label: 'ID' },
            { key: 'ticker', label: 'Ticker', render: v => <span style={{ fontWeight: 600 }}>{v}</span> },
            { key: 'action', label: 'Action', render: v => <Badge text={v?.toUpperCase()} color={v === 'buy' ? 'var(--green)' : 'var(--red)'} /> },
            { key: 'quantity', label: 'Qty' },
            { key: 'status', label: 'Status', render: v => <Badge text={v} color={v === 'routed' ? 'var(--green)' : v === 'pending' ? 'var(--yellow)' : 'var(--red)'} /> },
            { key: 'assigned_bot_id', label: 'Bot', render: v => v || '—' },
            { key: 'created_at', label: 'Age', render: v => v ? `${Math.round((Date.now() - new Date(v).getTime()) / 60000)}m` : '—' },
          ]} data={pending} />
        )}
      </Card>
      <OtpModal open={!!showOtp} onClose={() => setShowOtp(null)} onConfirm={handleAssign} title="Confirm Trade Assignment" />
    </div>
  );
};

// ─── Page: System Health ────────────────────────────────────────────────────
const SystemHealth = ({ api }) => {
  const [cron, setCron] = useState(null);
  const [trades, setTrades] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [c, t] = await Promise.all([
        api('/admin/bot/cron-health'),
        api('/admin/bot/trade-history?per_page=20'),
      ]);
      setCron(c); setTrades(t);
    } catch (e) { console.error(e); }
    setLoading(false);
  }, [api]);

  useEffect(() => { load(); }, [load]);

  if (loading) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '60vh' }}><Spinner /></div>;

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <h2 style={{ fontSize: 20, fontWeight: 700 }}>System Health</h2>
        <Btn variant="secondary" small onClick={load}>{Icons.refresh}</Btn>
      </div>

      <Card>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>Cron Jobs</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {(cron?.jobs || []).map((job, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'var(--bg-elevated)', borderRadius: 8, border: '1px solid var(--border)' }}>
              <div style={{ width: 10, height: 10, borderRadius: '50%', background: job.status === 'ok' ? 'var(--green)' : job.status === 'error' ? 'var(--red)' : 'var(--yellow)', boxShadow: `0 0 8px ${job.status === 'ok' ? 'var(--green)' : job.status === 'error' ? 'var(--red)' : 'var(--yellow)'}44` }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{job.name}</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{job.schedule}</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>Last run</div>
                <div style={{ fontSize: 12, fontWeight: 500 }}>{job.last_run ? new Date(job.last_run).toLocaleDateString() + ' ' + new Date(job.last_run).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Never'}</div>
              </div>
            </div>
          ))}
        </div>
        {cron?.server_time && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 10 }}>Server time: {new Date(cron.server_time).toLocaleString()}</div>}
      </Card>

      <Card>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 14 }}>Recent Trades (All Users)</div>
        <Table columns={[
          { key: 'timestamp', label: 'Time', render: v => v ? new Date(v).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—' },
          { key: 'username', label: 'User' },
          { key: 'role', label: 'Role', render: v => <Badge text={v} color={v === 'agent' ? 'var(--blue)' : 'var(--accent)'} /> },
          { key: 'type', label: 'Type', render: v => <Badge text={v?.toUpperCase()} color={v === 'buy' ? 'var(--green)' : v === 'sell' ? 'var(--red)' : 'var(--text-muted)'} /> },
          { key: 'ticker', label: 'Ticker', render: v => <span style={{ fontWeight: 600 }}>{v}</span> },
          { key: 'quantity', label: 'Qty' },
          { key: 'value', label: 'Value', render: v => `$${(v || 0).toFixed(2)}` },
        ]} data={trades?.trades || []} />
        {trades && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 10 }}>Showing {trades.trades?.length || 0} of {trades.total || 0} total trades</div>}
      </Card>
    </div>
  );
};

// ─── Sidebar ────────────────────────────────────────────────────────────────
const navItems = [
  { id: 'command', label: 'Command Center', icon: Icons.command },
  { id: 'bots', label: 'Bot Management', icon: Icons.bot },
  { id: 'revenue', label: 'Revenue', icon: Icons.dollar },
  { id: 'users', label: 'Users', icon: Icons.users },
  { id: 'email', label: 'Email Trades', icon: Icons.mail },
  { id: 'health', label: 'System Health', icon: Icons.activity },
];

const Sidebar = ({ active, onNav, onLogout }) => (
  <div style={{
    width: 220, height: '100vh', background: 'var(--bg-card)', borderRight: '1px solid var(--border)',
    display: 'flex', flexDirection: 'column', flexShrink: 0, position: 'relative', zIndex: 10,
  }}>
    {/* Logo */}
    <div style={{ padding: '20px 16px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: '1px solid var(--border)' }}>
      <div style={{ width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><img src="/static/img/logo.png" alt="" width="34" height="34" style={{ objectFit: 'contain' }} /></div>
      <div>
        <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.3px' }}>ApesTogether</div>
        <div style={{ fontSize: 10, color: 'var(--accent)', fontWeight: 600, letterSpacing: '.5px' }}>ADMIN</div>
      </div>
    </div>

    {/* Nav */}
    <nav style={{ flex: 1, padding: '12px 8px', display: 'flex', flexDirection: 'column', gap: 2 }}>
      {navItems.map(item => {
        const isActive = active === item.id;
        return (
          <button key={item.id} onClick={() => onNav(item.id)} style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 8,
            border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: isActive ? 600 : 400,
            background: isActive ? 'var(--accent-glow)' : 'transparent',
            color: isActive ? 'var(--accent)' : 'var(--text-secondary)',
            transition: 'all .15s',
          }}
          onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = 'var(--bg-hover)'; }}
          onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}>
            {item.icon}
            {item.label}
          </button>
        );
      })}
    </nav>

    {/* Logout */}
    <div style={{ padding: '12px 8px', borderTop: '1px solid var(--border)' }}>
      <button onClick={onLogout} style={{
        display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 8,
        border: 'none', cursor: 'pointer', fontSize: 13, color: 'var(--text-muted)',
        background: 'transparent', width: '100%', transition: 'all .15s',
      }}
      onMouseEnter={e => e.currentTarget.style.color = 'var(--red)'}
      onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}>
        {Icons.logout}
        Log Out
      </button>
    </div>
  </div>
);

// ─── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const { api } = useApi();
  const [page, setPage] = useState('command');

  const handleLogout = () => {
    window.location.href = '/logout';
  };

  const pages = {
    command: <CommandCenter api={api} />,
    bots: <BotManagement api={api} />,
    revenue: <RevenuePage api={api} />,
    users: <UsersPage api={api} />,
    email: <EmailMonitor api={api} />,
    health: <SystemHealth api={api} />,
  };

  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <Sidebar active={page} onNav={setPage} onLogout={handleLogout} />
      <main style={{ flex: 1, overflow: 'auto', padding: 28 }}>
        {pages[page] || <div>Page not found</div>}
      </main>
    </div>
  );
};

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(err) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#ef4444;font-family:monospace"><h2>React Render Error</h2><pre>' + err.message + '\n' + err.stack + '</pre></div>';
}
</script>

<script>
// Fallback: if Babel fails to compile, show the error
window.onerror = function(msg, url, line, col, err) {
  var root = document.getElementById('root');
  if (root && !root.children.length) {
    root.innerHTML = '<div style="padding:40px;color:#ef4444;font-family:monospace"><h2>JS Error</h2><pre>' + msg + '\nLine: ' + line + ', Col: ' + col + (err ? '\n' + err.stack : '') + '</pre></div>';
  }
};
